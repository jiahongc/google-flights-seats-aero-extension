<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seats.aero for Google Flights</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-icon {
      font-size: 20px;
      line-height: 1;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.2px;
    }

    .settings {
      padding: 8px 0;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      transition: background 0.15s ease;
    }

    .setting-row:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .setting-label {
      font-size: 13px;
      color: #c8c8d4;
      user-select: none;
      cursor: pointer;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #2d2d44;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.25s ease;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #6b6b80;
      border-radius: 50%;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.25s ease;
    }

    .toggle input:checked + .toggle-track {
      background: rgba(26, 115, 232, 0.3);
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(18px);
      background: #1a73e8;
    }

    .toggle input:focus-visible + .toggle-track {
      outline: 2px solid #1a73e8;
      outline-offset: 2px;
    }

    .footer {
      padding: 14px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
    }

    .footer-text {
      font-size: 11px;
      color: #6b6b80;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">✈️</span>
    <span class="header-title">Seats.aero for Google Flights</span>
  </div>

  <div class="settings">
    <div class="setting-row">
      <label class="setting-label" for="globalButton">Global search button</label>
      <label class="toggle">
        <input type="checkbox" id="globalButton">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="setting-row">
      <label class="setting-label" for="perFlightButtons">Per-flight buttons</label>
      <label class="toggle">
        <input type="checkbox" id="perFlightButtons">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="setting-row">
      <label class="setting-label" for="flexibleDays">Flexible dates (±3 days)</label>
      <label class="toggle">
        <input type="checkbox" id="flexibleDays">
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div class="footer">
    <p class="footer-text">Click buttons on Google Flights to search award availability</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
